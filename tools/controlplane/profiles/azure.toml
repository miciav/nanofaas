# Azure defaults for azure-vm-loadtest TUI scenario.
# Required fields: resource_group, location.
# Optional fields: uncomment and set as needed.

resource_group = "my-rg"
location = "westeurope"
vm_size = "Standard_B2s"
loadgen_vm_size = "Standard_B1s"
