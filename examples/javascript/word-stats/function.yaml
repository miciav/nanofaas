name: word-stats-javascript
image: nanofaas/word-stats-javascript:latest
timeoutMs: 10000
concurrency: 2
executionMode: DEPLOYMENT

x-cli:
  build:
    context: ../../../..
    dockerfile: examples/javascript/word-stats/Dockerfile
    platform: linux/amd64
    push: true

catalog:
  family: word-stats
  runtime: javascript
  description: Node.js JavaScript word statistics demo.
  defaultImage: localhost:5000/nanofaas/javascript-word-stats:e2e
  defaultPayload: word-stats-sample.json
