name: json-transform-javascript
image: nanofaas/json-transform-javascript:latest
timeoutMs: 10000
concurrency: 2
executionMode: DEPLOYMENT

x-cli:
  build:
    context: ../../../..
    dockerfile: examples/javascript/json-transform/Dockerfile
    platform: linux/amd64
    push: true

catalog:
  family: json-transform
  runtime: javascript
  description: Node.js JavaScript JSON transform demo.
  defaultImage: localhost:5000/nanofaas/javascript-json-transform:e2e
  defaultPayload: json-transform-sample.json
