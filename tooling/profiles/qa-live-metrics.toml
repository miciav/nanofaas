name = "qa-live-metrics"
modules = ["autoscaler"]

[control_plane]
implementation = "java"
build_mode = "jvm"

[tests]
enabled = true
api = false
e2e_mockk8s = false
metrics = true
load_profile = "quick"

[metrics]
required = [
  "function_dispatch_total",
  "function_success_total",
  "function_warm_start_total",
  "function_latency_ms",
  "function_queue_wait_ms",
  "function_e2e_latency_ms"
]
strict_required = false

[report]
title = "QA Live Metrics"
include_baseline = false
