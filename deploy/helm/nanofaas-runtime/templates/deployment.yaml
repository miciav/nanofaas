apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nanofaas-runtime.name" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "nanofaas-runtime.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.functionRuntime.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "nanofaas-runtime.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "nanofaas-runtime.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: function-runtime
          image: "{{ .Values.functionRuntime.image.repository }}:{{ .Values.functionRuntime.image.tag }}"
          imagePullPolicy: {{ .Values.functionRuntime.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.functionRuntime.service.port }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.functionRuntime.service.port }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.functionRuntime.service.port }}
          resources:
            {{- toYaml .Values.functionRuntime.resources | nindent 12 }}
