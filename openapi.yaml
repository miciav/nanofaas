openapi: 3.0.3
info:
  title: nanofaas Control Plane API
  version: 0.5.0
  description: |
    Minimal FaaS control plane API for function registration and invocation.
servers:
  - url: /

paths:
  /v1/functions:
    get:
      summary: List functions
      operationId: listFunctions
      responses:
        '200':
          description: Function list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FunctionResponse'
    post:
      summary: Register a function
      operationId: registerFunction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FunctionSpec'
      responses:
        '201':
          description: Function registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FunctionResponse'
        '422':
          description: Image not found in registry
        '424':
          description: Image pull authentication required (configure imagePullSecrets)
        '503':
          description: Registry unavailable during image validation
        '409':
          description: Function already exists
  /v1/functions/{name}:
    get:
      summary: Get a function
      operationId: getFunction
      parameters:
        - $ref: '#/components/parameters/FunctionName'
      responses:
        '200':
          description: Function details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FunctionResponse'
        '404':
          description: Not found
    delete:
      summary: Delete a function
      operationId: deleteFunction
      parameters:
        - $ref: '#/components/parameters/FunctionName'
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found

  /v1/functions/{name}:invoke:
    post:
      summary: Invoke a function synchronously
      operationId: invokeFunctionSync
      parameters:
        - $ref: '#/components/parameters/FunctionName'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/TraceId'
        - $ref: '#/components/parameters/TimeoutMs'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvocationRequest'
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Function result
          headers:
            X-Execution-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvocationResponse'
            application/octet-stream:
              schema:
                type: string
                format: binary
        '408':
          description: Invocation timed out. The execution is terminal and will remain in `timeout` if later inspected via `GET /v1/executions/{executionId}`.
        '429':
          description: Too many requests. Returned for rate limiting and queue/admission backpressure on the synchronous invoke path.
        '500':
          description: Invocation failed

  /v1/functions/{name}:enqueue:
    post:
      summary: Enqueue a function invocation asynchronously
      operationId: invokeFunctionAsync
      parameters:
        - $ref: '#/components/parameters/FunctionName'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/TraceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvocationRequest'
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnqueueResponse'
        '429':
          description: Too many requests. Returned for rate limiting or async queue saturation.
        '500':
          description: Enqueue failed

  /v1/executions/{executionId}:
    get:
      summary: Get execution status/result
      operationId: getExecution
      parameters:
        - $ref: '#/components/parameters/ExecutionId'
      responses:
        '200':
          description: Execution status. Terminal values (`success`, `error`, `timeout`) are stable and are not rewritten by late callbacks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionStatus'
        '404':
          description: Not found

  /v1/admin/runtime-config:
    get:
      summary: Get the current runtime configuration snapshot
      description: Available only when `nanofaas.admin.runtime-config.enabled=true`.
      operationId: getRuntimeConfig
      responses:
        '200':
          description: Current runtime configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeConfigSnapshot'
        '404':
          description: Admin runtime-config API is disabled
    patch:
      summary: Patch runtime configuration
      description: Available only when `nanofaas.admin.runtime-config.enabled=true`.
      operationId: patchRuntimeConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeConfigPatchRequest'
      responses:
        '200':
          description: Runtime configuration updated and applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeConfigPatchResponse'
        '400':
          description: Malformed request. Duration fields must use ISO-8601 format such as `PT5S`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeConfigParseError'
        '404':
          description: Admin runtime-config API is disabled
        '409':
          description: Revision mismatch
        '422':
          description: Validation failed for the effective runtime configuration after applying the patch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrors'
        '503':
          description: Configuration update was rolled back because applying it to live components failed

  /v1/admin/runtime-config/validate:
    post:
      summary: Validate a runtime configuration patch
      description: Available only when `nanofaas.admin.runtime-config.enabled=true`.
      operationId: validateRuntimeConfigPatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeConfigPatchRequest'
      responses:
        '200':
          description: Patch is valid against the current effective configuration
        '400':
          description: Malformed request. Duration fields must use ISO-8601 format such as `PT5S`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeConfigParseError'
        '404':
          description: Admin runtime-config API is disabled
        '422':
          description: Validation failed for the effective runtime configuration after applying the patch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrors'

components:
  parameters:
    FunctionName:
      name: name
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-zA-Z][a-zA-Z0-9._-]{0,62}$'
      description: Function name
    ExecutionId:
      name: executionId
      in: path
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: Client-provided key to deduplicate requests.
    TraceId:
      name: X-Trace-Id
      in: header
      required: false
      schema:
        type: string
      description: Trace identifier propagated to function pods.
    TimeoutMs:
      name: X-Timeout-Ms
      in: header
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 300000
      description: Max time in milliseconds for sync invocation.

  schemas:
    FunctionSummary:
      type: object
      required: [name, image, concurrency]
      properties:
        name:
          type: string
        image:
          type: string
        concurrency:
          type: integer
          minimum: 1
        createdAt:
          type: string
          format: date-time
    FunctionSpec:
      type: object
      required: [name, image]
      properties:
        name:
          type: string
          description: Function name
        image:
          type: string
          description: Container image for the function runtime
        command:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string
        resources:
          $ref: '#/components/schemas/ResourceSpec'
        timeoutMs:
          type: integer
          minimum: 1
          maximum: 300000
        concurrency:
          type: integer
          minimum: 1
          description: Max concurrent in-flight invocations for this function
        maxRetries:
          type: integer
          minimum: 0
          default: 3
          description: Number of retries for failed invocations (default 3)
        endpointUrl:
          type: string
          description: Optional HTTP endpoint for pool execution mode
        executionMode:
          type: string
          enum: [LOCAL, POOL, DEPLOYMENT]
          description: Execution mode for the function (DEPLOYMENT is default)
        runtimeMode:
          type: string
          enum: [HTTP, STDIO, FILE]
          default: HTTP
          description: |
            How the watchdog interacts with the function process:
            - HTTP: Function exposes HTTP server (Java Spring, Python FastAPI)
            - STDIO: Function reads stdin JSON, writes stdout JSON (scripts)
            - FILE: Function reads input file, writes output file (Bash, binaries)
        runtimeCommand:
          type: string
          description: |
            Custom command to run the function process.
            Default depends on runtime (e.g., "java -jar /app/app.jar" for Java).
        imagePullSecrets:
          type: array
          description: Optional Kubernetes imagePullSecrets names used for private registry pulls.
          items:
            type: string
        queueSize:
          type: integer
          minimum: 1
          description: Bounded in-memory queue size
    FunctionResponse:
      type: object
      required: [name, image, requestedExecutionMode, effectiveExecutionMode]
      properties:
        name:
          type: string
          description: Function name
        image:
          type: string
          description: Container image for the function runtime
        command:
          type: array
          items:
            type: string
        env:
          type: object
          additionalProperties:
            type: string
        resources:
          $ref: '#/components/schemas/ResourceSpec'
        timeoutMs:
          type: integer
          minimum: 1
          maximum: 300000
        concurrency:
          type: integer
          minimum: 1
          description: Max concurrent in-flight invocations for this function
        maxRetries:
          type: integer
          minimum: 0
          description: Number of retries for failed invocations
        queueSize:
          type: integer
          minimum: 1
          description: Bounded in-memory queue size
        endpointUrl:
          type: string
          description: Effective HTTP endpoint used for POOL or provider-backed DEPLOYMENT invocation
        requestedExecutionMode:
          type: string
          enum: [LOCAL, POOL, DEPLOYMENT]
          description: Execution mode requested at registration time
        effectiveExecutionMode:
          type: string
          enum: [LOCAL, POOL, DEPLOYMENT]
          description: Effective execution mode after provider selection or degradation
        deploymentBackend:
          type: string
          description: Selected managed deployment backend when `effectiveExecutionMode=DEPLOYMENT`
          example: k8s
        degradationReason:
          type: string
          description: Present when a `DEPLOYMENT` request degrades to `POOL`
        runtimeMode:
          type: string
          enum: [HTTP, STDIO, FILE]
        runtimeCommand:
          type: string
        scalingConfig:
          $ref: '#/components/schemas/ScalingConfig'
        imagePullSecrets:
          type: array
          items:
            type: string
    ResourceSpec:
      type: object
      properties:
        cpu:
          type: string
          description: Kubernetes CPU request/limit (e.g., 250m)
        memory:
          type: string
          description: Kubernetes memory request/limit (e.g., 256Mi)
    ScalingConfig:
      type: object
      properties:
        strategy:
          type: string
          enum: [INTERNAL, HPA]
        minReplicas:
          type: integer
          minimum: 0
        maxReplicas:
          type: integer
          minimum: 1
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/ScalingMetric'
        concurrencyControl:
          $ref: '#/components/schemas/ConcurrencyControlConfig'
    ScalingMetric:
      type: object
      properties:
        type:
          type: string
        target:
          type: string
        resource:
          type: string
    ConcurrencyControlConfig:
      type: object
      properties:
        mode:
          type: string
          enum: [FIXED, STATIC_PER_POD, ADAPTIVE_PER_POD]
        targetInFlightPerPod:
          type: integer
          minimum: 1
        minTargetInFlightPerPod:
          type: integer
          minimum: 1
        maxTargetInFlightPerPod:
          type: integer
          minimum: 1
        upscaleCooldownMs:
          type: integer
          format: int64
          minimum: 0
        downscaleCooldownMs:
          type: integer
          format: int64
          minimum: 0
        highLoadThreshold:
          type: number
          format: double
        lowLoadThreshold:
          type: number
          format: double
    InvocationRequest:
      type: object
      properties:
        input:
          description: JSON input for the function
          oneOf:
            - type: object
            - type: array
            - type: string
            - type: number
            - type: boolean
            - type: 'null'
        metadata:
          type: object
          additionalProperties:
            type: string
    InvocationResponse:
      type: object
      required: [executionId, status]
      properties:
        executionId:
          type: string
        status:
          type: string
          enum: [success, error]
        output:
          description: JSON output from the function
          oneOf:
            - type: object
            - type: array
            - type: string
            - type: number
            - type: boolean
            - type: 'null'
        error:
          $ref: '#/components/schemas/ErrorInfo'
    EnqueueResponse:
      type: object
      required: [executionId, status]
      properties:
        executionId:
          type: string
        status:
          type: string
          enum: [queued]
    ExecutionStatus:
      type: object
      required: [executionId, status]
      properties:
        executionId:
          type: string
        status:
          type: string
          enum: [queued, running, success, error, timeout]
          description: |
            Terminal states are `success`, `error`, and `timeout`.
            Once an execution reaches `timeout`, later completion callbacks do not rewrite it.
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        output:
          description: JSON output (present on success)
          oneOf:
            - type: object
            - type: array
            - type: string
            - type: number
            - type: boolean
            - type: 'null'
        error:
          $ref: '#/components/schemas/ErrorInfo'
    ErrorInfo:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
    RuntimeConfigPatchRequest:
      type: object
      properties:
        expectedRevision:
          type: integer
          format: int64
          description: Required for `PATCH`; omitted for `/validate`.
        rateMaxPerSecond:
          type: integer
          minimum: 1
        syncQueueEnabled:
          type: boolean
        syncQueueAdmissionEnabled:
          type: boolean
        syncQueueMaxEstimatedWait:
          type: string
          format: duration
          description: ISO-8601 duration string. Must be positive and must not exceed `syncQueueMaxQueueWait` in the effective configuration.
        syncQueueMaxQueueWait:
          type: string
          format: duration
          description: ISO-8601 duration string. Must be positive and must be greater than or equal to `syncQueueMaxEstimatedWait` in the effective configuration.
        syncQueueRetryAfterSeconds:
          type: integer
          minimum: 1
    RuntimeConfigSnapshot:
      type: object
      required: [revision, rateMaxPerSecond, syncQueueEnabled, syncQueueAdmissionEnabled, syncQueueMaxEstimatedWait, syncQueueMaxQueueWait, syncQueueRetryAfterSeconds]
      properties:
        revision:
          type: integer
          format: int64
        rateMaxPerSecond:
          type: integer
        syncQueueEnabled:
          type: boolean
        syncQueueAdmissionEnabled:
          type: boolean
        syncQueueMaxEstimatedWait:
          type: string
          format: duration
        syncQueueMaxQueueWait:
          type: string
          format: duration
        syncQueueRetryAfterSeconds:
          type: integer
    RuntimeConfigPatchResponse:
      type: object
      required: [revision, effectiveConfig, appliedAt, changeId, warnings]
      properties:
        revision:
          type: integer
          format: int64
        effectiveConfig:
          $ref: '#/components/schemas/RuntimeConfigSnapshot'
        appliedAt:
          type: string
          format: date-time
        changeId:
          type: string
        warnings:
          type: array
          items:
            type: string
    ValidationErrors:
      type: object
      required: [errors]
      properties:
        errors:
          type: array
          items:
            type: string
    RuntimeConfigParseError:
      type: object
      required: [error, field, value]
      properties:
        error:
          type: string
        field:
          type: string
        value:
          type: string
